<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dossier 2030 – Vanbreda Health Care</title>
    <meta name="description" content="Fictief Health Care dossier 2030 – één samenhangende operatie over Claims, Communicatie en B2B/B2I heen." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Homemade+Apple&family=Kalam:wght@400;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Outfit:wght@300;400;500;600;700;800&family=Patrick+Hand&family=Reenie+Beanie&family=VT323&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Mobile hint overlay -->
    <div id="mobile-hint" style="display:none;position:fixed;inset:0;z-index:99999;background:#0a1628;color:#fff;font-family:'Outfit',sans-serif;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 32px;gap:24px;">
      <div style="font-size:48px;">🖥️</div>
      <div style="font-size:22px;font-weight:700;color:#ff8c00;">Deze experience is ontworpen voor desktop</div>
      <div style="font-size:15px;line-height:1.6;color:rgba(255,255,255,0.65);max-width:340px;">Voor de beste ervaring met video, animaties en interactie, open deze pagina op een laptop of desktop.</div>
      <button id="mobile-hint-dismiss" style="margin-top:12px;padding:12px 28px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);border-radius:30px;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;">Toch doorgaan op mobiel →</button>
    </div>
    <script>
      (function(){
        var isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 900;
        if(isMobile){
          var hint = document.getElementById('mobile-hint');
          hint.style.display = 'flex';
          document.getElementById('mobile-hint-dismiss').addEventListener('click', function(){ hint.style.display = 'none'; });
        }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
