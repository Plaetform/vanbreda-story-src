# Dual access gate, evaluated in nginx (EasyAuth runs in AllowAnonymous mode and
# only forwards requests — see container_apps.tf authConfig).
#
# A request is allowed if EITHER:
#   (a) EasyAuth attached an authenticated AE identity (SSO path), or
#   (b) the visitor carries a valid shared access-key cookie (customer path).
# Anything else is redirected to the Entra sign-in page.
#
# Security note: Container Apps strips client-supplied X-MS-CLIENT-PRINCIPAL-*
# headers and only sets them itself for authenticated requests, so the SSO branch
# below cannot be spoofed from the outside.

# Authenticated == EasyAuth injected ANY principal header. Concatenating the
# three it sets (base64 blob, object id, name) and testing for non-empty avoids a
# redirect loop if a token happens to leave one of them (e.g. -NAME) blank: the
# user is logged in, so a bounce to /.auth/login would just send them back here.
map "$http_x_ms_client_principal$http_x_ms_client_principal_id$http_x_ms_client_principal_name" $sso_ok {
    default 0;
    "~.+"   1;
}

# The quoted placeholder below is replaced at image build time from the
# ACCESS_KEY build arg (Dockerfile). If no key is configured it becomes an
# unguessable sentinel so the customer path stays closed until a key is set.
map $cookie_vbkey $key_ok {
    default          0;
    "__ACCESS_KEY__" 1;
}

map "$sso_ok$key_ok" $authorized {
    "00"    0;
    default 1;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Emit relative Location headers. The app sits behind the shared App Gateway,
    # which rewrites the inbound Host to the internal ACA FQDN. If nginx built
    # absolute redirects from that Host, the login/unlock bounces would land the
    # browser on ca-app-*.azurecontainerapps.io (off the custom domain) and break
    # both SSO (unregistered callback) and the access-key cookie (wrong host). A
    # relative Location keeps the browser on whatever host it actually used.
    absolute_redirect off;

    # EasyAuth has no token store, so the full token set rides in the
    # AppServiceAuthSession cookie, which the sidecar forwards to us and can be
    # several KB. Give the header buffers headroom so authenticated requests with
    # a large auth cookie don't 400 (mirrors the app's 64KB NODE_OPTIONS note).
    large_client_header_buffers 4 32k;

    # Customer access link: /unlock?k=<key> stores the key in a cookie, then
    # sends the visitor to the app. The cookie is validated on every later
    # request by the $key_ok map above, so a wrong key just bounces to SSO.
    location = /unlock {
        add_header Set-Cookie "vbkey=$arg_k; Path=/; Secure; HttpOnly; SameSite=Lax; Max-Age=2592000" always;
        return 302 /;
    }

    location / {
        if ($authorized = 0) {
            return 302 "/.auth/login/aad?post_login_redirect_uri=/";
        }
        try_files $uri $uri/ /index.html;
    }
}
